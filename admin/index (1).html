<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecowave Admin — Tableau de bord</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300..800&family=Schibsted+Grotesk:wght@400..900&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Ecowave Admin Dashboard — styles
   Premium black + luxury green, Hanken/Schibsted Grotesk
   ============================================================ */
:root{
  --ink-900:#0B0F0D; --ink-800:#121815; --ink-700:#1A211E; --ink-600:#2C3531;
  --ink-500:#46524D; --ink-400:#6A766F; --ink-300:#97A19B; --ink-200:#C3CAC6;
  --green-700:#0F4D34; --green-600:#126B4A; --green-500:#1B7A54; --green-400:#45886A;
  --green-300:#7DB093; --green-100:#D7E8DE; --green-50:#EDF4F0;
  --lime:#2DE11F; --lime-soft:#8BF083;
  --white:#fff; --paper:#FBFCFB; --mist:#F4F6F5; --cloud:#ECEFED; --line:#E3E7E5; --line-soft:#EDEFEE;
  --gold-500:#C9A24B; --gold-100:#F3EAD2;
  --danger:#B23A33; --danger-bg:#F6E2E0; --success:#1B7A54; --success-bg:#E4F1EA;
  --warn:#B8862A; --warn-bg:#F6ECD6; --info:#2D6E8E; --info-bg:#E1EEF4;
  --r-sm:10px; --r-md:14px; --r-lg:20px; --r-xl:28px; --r-pill:999px;
  --font-d:"Schibsted Grotesk",sans-serif; --font-b:"Hanken Grotesk",sans-serif;
  --sh-xs:0 1px 2px rgba(11,15,13,.05);
  --sh-sm:0 1px 3px rgba(11,15,13,.06),0 1px 2px rgba(11,15,13,.04);
  --sh-md:0 4px 12px rgba(11,15,13,.07),0 2px 4px rgba(11,15,13,.04);
  --sh-lg:0 12px 28px rgba(11,15,13,.10),0 4px 10px rgba(11,15,13,.05);
  --sh-xl:0 28px 60px rgba(10,40,28,.16),0 10px 24px rgba(11,15,13,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-b);background:var(--mist);color:var(--ink-900);-webkit-font-smoothing:antialiased}
svg{display:block} .ic{display:inline-flex;line-height:0}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--ink-200);border-radius:8px;border:3px solid var(--mist)}

/* ---------- LOGIN ---------- */
#login{position:fixed;inset:0;z-index:100;background:radial-gradient(1100px 560px at 50% -10%,#14201a,#0B0F0D 60%);display:flex;align-items:center;justify-content:center;padding:24px}
#login.hide{display:none}
.login-card{width:100%;max-width:410px;background:var(--white);border-radius:var(--r-xl);box-shadow:var(--sh-xl);padding:42px 38px;text-align:center}
.login-logo{display:inline-flex;align-items:center;gap:10px;margin-bottom:6px}
.login-logo .wave-logo{background:var(--ink-900);border-radius:14px;padding:14px 20px;display:inline-flex;align-items:center;justify-content:center}
.side-admin-tag{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--lime-soft);font-weight:700;border:1px solid rgba(45,225,31,.3);padding:3px 8px;border-radius:var(--r-pill);margin-left:4px}
.login-logo .wave{width:42px;height:42px;border-radius:12px;background:var(--ink-900);display:flex;align-items:center;justify-content:center}
.login-logo .wave svg{width:23px;height:23px;color:var(--lime)}
.login-logo b{font-family:var(--font-d);font-size:21px;font-weight:800;letter-spacing:-.02em}
.login-card .sub{font-size:13px;color:var(--ink-400);margin-bottom:30px}
.fld{text-align:left;margin-bottom:16px}
.fld label{display:block;font-size:12px;font-weight:700;color:var(--ink-700);margin-bottom:6px}
.fld .inp{display:flex;align-items:center;gap:10px;border:1.5px solid var(--line);border-radius:var(--r-md);padding:12px 14px;background:var(--paper)}
.fld .inp svg{width:17px;height:17px;color:var(--ink-400)}
.fld input{border:none;outline:none;background:none;font-size:14px;width:100%;color:var(--ink-900)}
.fld .inp:focus-within{border-color:var(--green-500);box-shadow:0 0 0 4px rgba(27,122,84,.12)}
.btn-primary{width:100%;background:var(--green-600);color:#fff;font-weight:600;font-size:15px;padding:14px;border-radius:var(--r-pill);box-shadow:0 12px 28px rgba(15,77,52,.28);transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary:hover{background:var(--green-500);transform:translateY(-1px)}
.btn-primary svg{width:18px;height:18px}
.login-hint{margin-top:18px;font-size:11.5px;color:var(--ink-300)}

/* ---------- SHELL ---------- */
#app{display:none} #app.show{display:block}
.layout{display:flex;min-height:100vh}
.sidebar{width:252px;background:var(--ink-900);color:#fff;padding:22px 16px;display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:40;transition:transform .28s cubic-bezier(.22,1,.36,1)}
.side-logo{display:flex;align-items:center;gap:11px;padding:6px 10px 22px}
.side-logo .wave{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center}
.side-logo .wave svg{width:21px;height:21px;color:var(--lime)}
.side-logo b{font-family:var(--font-d);font-size:18px;font-weight:800;letter-spacing:-.02em;line-height:1}
.side-logo span{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--lime-soft);display:block;margin-top:3px}
.nav-group{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:rgba(255,255,255,.32);padding:16px 12px 8px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:var(--r-md);color:rgba(242,245,243,.72);font-size:14.5px;font-weight:500;transition:.15s;width:100%;text-align:left;position:relative}
.nav-item svg{width:18px;height:18px;flex:none}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:var(--green-600);color:#fff;box-shadow:0 8px 20px rgba(15,77,52,.4)}
.nav-item .badge{margin-left:auto;background:var(--lime);color:var(--ink-900);font-size:10.5px;font-weight:800;padding:2px 7px;border-radius:var(--r-pill)}
.nav-item.active .badge{background:rgba(255,255,255,.25);color:#fff}
.side-foot{margin-top:auto;padding-top:16px;border-top:1px solid rgba(255,255,255,.08)}
.side-user{display:flex;align-items:center;gap:10px;padding:8px 12px}
.side-user .av{width:36px;height:36px;border-radius:50%;background:var(--green-600);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.side-user .nm{font-size:13px;font-weight:600}
.side-user .rl{font-size:11px;color:rgba(255,255,255,.45)}
.side-logout{margin-left:auto;color:rgba(255,255,255,.5);padding:6px}
.side-logout:hover{color:#fff}.side-logout svg{width:17px;height:17px}

.main{margin-left:252px;flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{height:70px;background:rgba(251,252,251,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 30px;position:sticky;top:0;z-index:30}
.topbar-left{display:flex;align-items:center;gap:14px}
.burger{display:none;width:40px;height:40px;border-radius:10px;border:1px solid var(--line);background:#fff;align-items:center;justify-content:center}
.burger svg{width:20px;height:20px}
.topbar h1{font-family:var(--font-d);font-size:21px;font-weight:700;letter-spacing:-.02em}
.topbar .right{display:flex;align-items:center;gap:12px}
.pill-live{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--green-700);background:var(--success-bg);padding:7px 13px;border-radius:var(--r-pill)}
.pill-live .dot{width:7px;height:7px;border-radius:50%;background:var(--green-500);box-shadow:0 0 0 3px rgba(45,225,31,.25)}
.btn-ghost{display:inline-flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600;color:var(--ink-700);border:1.5px solid var(--line);background:#fff;padding:9px 16px;border-radius:var(--r-pill);transition:.15s}
.btn-ghost:hover{border-color:var(--ink-900)}.btn-ghost svg{width:16px;height:16px}
.btn-add{display:inline-flex;align-items:center;gap:8px;background:var(--ink-900);color:#fff;font-size:13.5px;font-weight:600;padding:10px 18px;border-radius:var(--r-pill);transition:.2s}
.btn-add:hover{background:var(--ink-700);transform:translateY(-1px)}.btn-add svg{width:16px;height:16px}
.btn-green{background:var(--green-600);box-shadow:0 8px 20px rgba(15,77,52,.25)}.btn-green:hover{background:var(--green-500)}

.content{padding:28px 30px 60px;max-width:1180px;width:100%}
.view{display:none}.view.show{display:block;opacity:1;animation:fade .3s ease}
@keyframes fade{from{transform:translateY(8px)}to{transform:none}}
.sec-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:14px;flex-wrap:wrap}
.sec-title h2{font-family:var(--font-d);font-size:18px;font-weight:700}
.sec-title .sub{font-size:13px;color:var(--ink-400);margin-top:2px}

/* ---------- KPI cards ---------- */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:26px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);padding:20px;box-shadow:var(--sh-sm);position:relative;overflow:hidden}
.kpi .ki{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.kpi .ki svg{width:20px;height:20px}
.kpi.g .ki{background:var(--green-50)}.kpi.g .ki svg{color:var(--green-600)}
.kpi.b .ki{background:var(--info-bg)}.kpi.b .ki svg{color:var(--info)}
.kpi.o .ki{background:var(--warn-bg)}.kpi.o .ki svg{color:var(--warn)}
.kpi.p .ki{background:#EDE7F6}.kpi.p .ki svg{color:#6B4FA8}
.kpi .kv{font-family:var(--font-d);font-size:28px;font-weight:700;letter-spacing:-.02em;line-height:1}
.kpi .kl{font-size:12.5px;color:var(--ink-400);margin-top:6px}
.kpi .ktrend{position:absolute;top:20px;right:18px;font-size:11.5px;font-weight:700;display:inline-flex;align-items:center;gap:3px}
.kpi .ktrend.up{color:var(--green-600)}.kpi .ktrend.down{color:var(--danger)}
.kpi .ktrend svg{width:13px;height:13px}

/* ---------- panels / grids ---------- */
.panel{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh-sm)}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line-soft)}
.panel-head h3{font-family:var(--font-d);font-size:16px;font-weight:700}
.panel-head a,.panel-head button.link{font-size:12.5px;font-weight:600;color:var(--green-600)}
.two-col{display:grid;grid-template-columns:1.6fr 1fr;gap:20px;margin-bottom:20px}

/* ---------- chart ---------- */
.chart{display:flex;align-items:flex-end;gap:14px;height:200px;padding:22px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end}
.bar-stack{width:100%;max-width:34px;display:flex;flex-direction:column-reverse;border-radius:6px 6px 0 0;overflow:hidden;transition:.3s}
.bar-a{background:var(--green-300)}.bar-c{background:var(--green-600)}
.bar-col .bm{font-size:11px;color:var(--ink-400);font-weight:600}
.chart-legend{display:flex;gap:18px;padding:0 22px 18px}
.chart-legend .lg{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink-500)}
.chart-legend .sw{width:13px;height:13px;border-radius:4px}

/* ---------- table ---------- */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-400);font-weight:700;padding:12px 16px;border-bottom:1px solid var(--line-soft)}
.tbl td{padding:14px 16px;border-bottom:1px solid var(--line-soft);font-size:13.5px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr.clickable{cursor:pointer;transition:.12s}.tbl tr.clickable:hover{background:var(--paper)}
.cust-cell{display:flex;align-items:center;gap:11px}
.cust-cell .av{width:34px;height:34px;border-radius:50%;background:var(--green-100);color:var(--green-700);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12.5px;flex:none}
.cust-cell .nm{font-weight:600;color:var(--ink-900)}
.cust-cell .meta{font-size:11.5px;color:var(--ink-400)}
.veh-cell{display:flex;align-items:center;gap:10px}
.veh-cell img{width:42px;height:30px;border-radius:6px;object-fit:cover;background:var(--mist)}
.veh-cell b{font-size:13px;font-weight:600}
.status{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:5px 11px;border-radius:var(--r-pill);white-space:nowrap}
.status svg{width:13px;height:13px}
.src-tag{font-size:11px;font-weight:600;color:var(--ink-500);background:var(--mist);padding:4px 9px;border-radius:var(--r-pill)}
.row-act{display:inline-flex;gap:6px}
.row-act button{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;color:var(--ink-500);transition:.12s}
.row-act button:hover{border-color:var(--ink-900);color:var(--ink-900)}
.row-act button svg{width:15px;height:15px}
.row-act button.go-confirm:hover{background:var(--success-bg);border-color:var(--green-500);color:var(--green-600)}
.row-act button.go-cancel:hover{background:var(--danger-bg);border-color:var(--danger);color:var(--danger)}

/* ---------- filters / search ---------- */
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.search{display:flex;align-items:center;gap:9px;background:#fff;border:1.5px solid var(--line);border-radius:var(--r-pill);padding:9px 16px;min-width:220px;flex:1;max-width:340px}
.search svg{width:16px;height:16px;color:var(--ink-400)}
.search input{border:none;outline:none;font-size:13.5px;width:100%;background:none}
.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip{font-size:12.5px;font-weight:600;color:var(--ink-500);background:#fff;border:1.5px solid var(--line);padding:8px 14px;border-radius:var(--r-pill);transition:.12s}
.chip:hover{border-color:var(--ink-300)}
.chip.active{background:var(--ink-900);color:#fff;border-color:var(--ink-900)}

/* ---------- modal / drawer ---------- */
.overlay{position:fixed;inset:0;background:rgba(11,15,13,.5);backdrop-filter:blur(3px);z-index:80;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:.2s}
.overlay.show{opacity:1;pointer-events:auto}
.modal{background:#fff;border-radius:var(--r-xl);box-shadow:var(--sh-xl);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;transform:translateY(12px);transition:.25s}
.overlay.show .modal{transform:none}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:22px 26px;border-bottom:1px solid var(--line-soft);position:sticky;top:0;background:#fff;z-index:2}
.modal-head h3{font-family:var(--font-d);font-size:18px;font-weight:700}
.modal-head .x{width:34px;height:34px;border-radius:50%;background:var(--mist);display:flex;align-items:center;justify-content:center;color:var(--ink-500)}
.modal-head .x svg{width:17px;height:17px}
.modal-body{padding:24px 26px}
.modal-foot{display:flex;justify-content:flex-end;gap:12px;padding:18px 26px;border-top:1px solid var(--line-soft);position:sticky;bottom:0;background:#fff}
.drawer{position:fixed;top:0;right:0;bottom:0;width:440px;max-width:92vw;background:#fff;box-shadow:var(--sh-xl);z-index:80;transform:translateX(100%);transition:.3s cubic-bezier(.22,1,.36,1);overflow-y:auto}
.drawer.show{transform:none}

/* ---------- forms ---------- */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.ff{margin-bottom:16px}
.ff label{display:block;font-size:12px;font-weight:700;color:var(--ink-700);margin-bottom:6px}
.ff .inp,.ff select,.ff textarea{display:flex;align-items:center;width:100%;border:1.5px solid var(--line);border-radius:var(--r-md);padding:11px 13px;background:var(--paper);font-size:14px;color:var(--ink-900)}
.ff .inp{gap:8px}.ff .inp .cur{color:var(--ink-400);font-weight:700}
.ff .inp input{border:none;outline:none;background:none;font-size:14px;width:100%}
.ff select{outline:none;cursor:pointer}.ff textarea{outline:none;resize:vertical;min-height:74px}
.ff .inp:focus-within,.ff select:focus,.ff textarea:focus{border-color:var(--green-500);box-shadow:0 0 0 4px rgba(27,122,84,.12)}

/* ---------- toggle ---------- */
.toggle{width:46px;height:26px;border-radius:var(--r-pill);background:var(--ink-200);position:relative;transition:.25s;flex:none}
.toggle.on{background:var(--green-500)}
.toggle .knob{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:.25s}
.toggle.on .knob{left:23px}

/* ---------- vehicle admin rows ---------- */
.vrow{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh-sm);padding:18px;display:grid;grid-template-columns:130px 1fr auto;gap:20px;align-items:center;transition:.2s;margin-bottom:16px}
.vrow:hover{box-shadow:var(--sh-md)}
.vrow .photo{width:130px;height:86px;border-radius:var(--r-md);object-fit:cover;background:var(--mist)}
.vrow .info h3{font-family:var(--font-d);font-size:17px;font-weight:700}
.vrow .badges{display:flex;gap:6px;margin:7px 0 11px}
.vbadge{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:4px 9px;border-radius:var(--r-pill)}
.vbadge.amg{background:var(--ink-900);color:#fff}.vbadge.cat{background:var(--green-50);color:var(--green-700)}
.priceline{display:flex;gap:18px;flex-wrap:wrap}
.priceitem{font-size:11.5px;color:var(--ink-400)}.priceitem b{display:block;font-family:var(--font-d);font-size:15px;color:var(--ink-900);font-weight:700}
.vactions{display:flex;flex-direction:column;align-items:flex-end;gap:12px}
.statusctl{display:flex;align-items:center;gap:10px}
.statustxt{font-size:12.5px;font-weight:700}.statustxt.on{color:var(--green-600)}.statustxt.off{color:var(--ink-400)}

/* ---------- calendar ---------- */
.cal-tabs{display:flex;gap:8px;margin-bottom:18px}
.cal-tab{display:flex;align-items:center;gap:9px;padding:10px 16px;border-radius:var(--r-md);border:1.5px solid var(--line);background:#fff;font-size:13.5px;font-weight:600;color:var(--ink-500);transition:.15s}
.cal-tab img{width:26px;height:18px;border-radius:4px;object-fit:cover}
.cal-tab.active{border-color:var(--ink-900);color:var(--ink-900);background:var(--paper)}
.calwrap{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh-sm);padding:24px;max-width:600px}
.calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.calhead b{font-family:var(--font-d);font-size:18px}
.calnav{width:34px;height:34px;border-radius:50%;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--ink-500)}.calnav svg{width:16px;height:16px}
.dow{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:8px}
.dow span{text-align:center;font-size:11px;font-weight:700;color:var(--ink-300)}
.days{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:14px;font-weight:500;border-radius:10px;cursor:pointer;border:1.5px solid transparent;transition:.12s;user-select:none;position:relative}
.day:hover{background:var(--green-50)}
.day.muted{color:var(--ink-200);pointer-events:none}
.day.blocked{background:var(--danger-bg);color:var(--danger);border-color:#e8bdb8}
.day.booked{background:var(--info-bg);color:var(--info);border-color:#b8d4e0;cursor:default}
.day .mk{font-size:8px;margin-top:1px}
.callegend{display:flex;gap:18px;margin-top:18px;padding-top:16px;border-top:1px solid var(--line-soft);flex-wrap:wrap}
.lg{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink-500)}.lg .sw{width:14px;height:14px;border-radius:5px}

/* ---------- customer detail drawer ---------- */
.cust-hero{padding:26px;background:var(--ink-900);color:#fff}

  <script>
    // Build a Lucide icon as a standalone SVG element — NO lucide.createIcons()
    // (which scans the whole document and mutates React-owned nodes → "removeChild"
    // crash). Reads only the static icon registry (lucide.icons). 100% React-safe.
    window.makeLucideSvg = function (name) {
      try {
        var L = window.lucide; if (!L || !L.icons) return null;
        var pascal = String(name).split("-").map(function (w) { return w.charAt(0).toUpperCase() + w.slice(1); }).join("");
        var node = L.icons[pascal] || L.icons[name]; if (!node) return null;
        var children = Array.isArray(node) ? node : (node && node.length ? node : null);
        if (!children) return null;
        var ns = "http://www.w3.org/2000/svg";
        var svg = document.createElementNS(ns, "svg");
        var base = { width: 24, height: 24, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", "stroke-width": 2, "stroke-linecap": "round", "stroke-linejoin": "round" };
        Object.keys(base).forEach(function (k) { svg.setAttribute(k, base[k]); });
        svg.setAttribute("class", "lucide lucide-" + name);
        children.forEach(function (c) {
          if (!Array.isArray(c)) return;
          var el = document.createElementNS(ns, c[0]); var attrs = c[1] || {};
          Object.keys(attrs).forEach(function (k) { el.setAttribute(k, attrs[k]); });
          svg.appendChild(el);
        });
        return svg;
      } catch (e) { return null; }
    };
  </script>

  <script>
/* db.js */
/* Ecowave Admin — Supabase data adapter (Phase 2-4).
   Loads real data into window.ADMIN (same shape the views expect) and
   provides async mutations. Falls back gracefully if offline. */
window.DB = (function () {
  let client = null;
  function c() {
    if (!client && window.supabase) client = window.supabase.createClient(window.SUPA_URL, window.SUPA_KEY);
    return client;
  }

  // ---- field mapping (DB snake_case -> app shape) ----
  function mapVehicle(r) {
    return { id: r.id, name: r.name, trim: r.trim, cat: r.cat, photo: toPhoto(r.photo),
      active: r.active, day: r.day_price, weekend: r.weekend_price, week: r.week_price,
      deposit: r.deposit, kmDay: r.km_day, extraKm: r.extra_km,
      power: r.power, fuel: r.fuel, trans: r.trans, seats: r.seats, plate: r.plate };
  }
  function toPhoto(p) {
    if (!p) return "../assets/car-front.png";
    if (p.startsWith("http")) return p;
    return ".." + (p.startsWith("/") ? p : "/" + p); // '/assets/x.jpg' -> '../assets/x.jpg'
  }
  function mapCustomer(r) {
    return { id: r.id, name: r.name, phone: r.phone, email: r.email, city: r.city,
      notes: r.notes || "", source: r.source, since: (r.created_at || "").slice(0, 7) };
  }
  function mapBooking(r) {
    return { _uuid: r.id, id: r.ref || ("B-" + r.id.slice(0, 4)), customer: r.customer_id,
      vehicle: r.vehicle_id, from: r.date_from, to: r.date_to, status: r.status,
      total: r.total, source: r.source, note: r.note || "" };
  }

  async function loadAll() {
    const cl = c();
    if (!cl) throw new Error("Supabase non chargé");
    const A = window.ADMIN;
    const [veh, cust, book, blk] = await Promise.all([
      cl.from("vehicles").select("*").order("created_at"),
      cl.from("customers").select("*").order("created_at", { ascending: false }),
      cl.from("bookings").select("*").order("date_from", { ascending: false }),
      cl.from("blocked_dates").select("*"),
    ]);
    if (veh.data && veh.data.length) A.vehicles = veh.data.map(mapVehicle);
    A.customers = (cust.data || []).map(mapCustomer);
    A.bookings = (book.data || []).map(mapBooking);
    const blocked = {};
    (blk.data || []).forEach(r => { (blocked[r.vehicle_id] = blocked[r.vehicle_id] || []).push(r.date); });
    A.blocked = blocked;
    return A;
  }

  // ---- AUTH ----
  async function signIn(email, password) {
    const { data, error } = await c().auth.signInWithPassword({ email, password });
    if (error) throw error;
    return data;
  }
  async function signOut() { await c().auth.signOut(); }
  async function currentSession() { const { data } = await c().auth.getSession(); return data.session; }

  // ---- MUTATIONS ----
  async function createBooking(b) {
    const ref = "B-" + Math.floor(1000 + Math.random() * 9000);
    const { data, error } = await c().from("bookings").insert({
      ref, customer_id: b.customer, vehicle_id: b.vehicle, date_from: b.from, date_to: b.to,
      status: b.status || "confirmed", total: Number(b.total) || 0, source: b.source, note: b.note || "",
    }).select().single();
    if (error) throw error;
    return mapBooking(data);
  }
  async function updateBooking(uuid, patch) {
    const db = {};
    if (patch.status != null) db.status = patch.status;
    if (patch.total != null) db.total = Number(patch.total);
    if (patch.from != null) db.date_from = patch.from;
    if (patch.to != null) db.date_to = patch.to;
    if (patch.customer != null) db.customer_id = patch.customer;
    if (patch.vehicle != null) db.vehicle_id = patch.vehicle;
    if (patch.source != null) db.source = patch.source;
    if (patch.note != null) db.note = patch.note;
    const { error } = await c().from("bookings").update(db).eq("id", uuid);
    if (error) throw error;
  }
  async function createCustomer(cu) {
    const { data, error } = await c().from("customers").insert({
      name: cu.name, phone: cu.phone, email: cu.email, city: cu.city, source: cu.source, notes: cu.notes || "",
    }).select().single();
    if (error) throw error;
    return mapCustomer(data);
  }
  async function setBlocked(vehicleId, date, on) {
    if (on) {
      const { error } = await c().from("blocked_dates").insert({ vehicle_id: vehicleId, date });
      if (error && error.code !== "23505") throw error; // ignore duplicate
    } else {
      const { error } = await c().from("blocked_dates").delete().eq("vehicle_id", vehicleId).eq("date", date);
      if (error) throw error;
    }
  }
  async function updateVehicle(id, patch) {
    const db = {};
    const map = { name: "name", trim: "trim", cat: "cat", active: "active", day: "day_price",
      weekend: "weekend_price", week: "week_price", deposit: "deposit", kmDay: "km_day", extraKm: "extra_km" };
    Object.keys(patch).forEach(k => { if (map[k]) db[map[k]] = patch[k]; });
    const { error } = await c().from("vehicles").update(db).eq("id", id);
    if (error) throw error;
  }

  return { loadAll, signIn, signOut, currentSession, createBooking, updateBooking, createCustomer, setBlocked, updateVehicle };
})();

/* Ecowave Admin — Bookings view (list, filter, create, edit, confirm, cancel) */
function Bookings({ openNew }) {
  const A = window.ADMIN;
  const [list, setList] = useState(A.bookings);
  const [filter, setFilter] = useState("all");
  const [q, setQ] = useState("");
  const [modal, setModal] = useState(null); // {mode:'new'|'edit', booking}

  useEffect(() => { if (openNew) setModal({ mode: "new" }); }, [openNew]);

  const filters = [
    { k: "all", label: "Toutes" },
    { k: "pending", label: "En attente" },
    { k: "confirmed", label: "Confirmées" },
    { k: "active", label: "En cours" },
    { k: "completed", label: "Terminées" },
    { k: "cancelled", label: "Annulées" },
  ];

  const shown = list.filter(b => {
    if (filter !== "all" && b.status !== filter) return false;
    if (q) {
      const c = A.customerById(b.customer) || {};
      const hay = (b.id + " " + (c.name || "") + " " + b.source).toLowerCase();
      if (!hay.includes(q.toLowerCase())) return false;
    }
    return true;
  });

  async function setStatus(id, status, msg) {
    const b = list.find(x => x.id === id);
    setList(list.map(x => x.id === id ? { ...x, status } : x));
    if (b) { b.status = status; } // sync window.ADMIN
    try { if (b && b._uuid) await window.DB.updateBooking(b._uuid, { status }); toast(msg); }
    catch (e) { toast("Erreur — réessayez"); }
  }
  async function saveBooking(data) {
    if (data._uuid) {
      const merged = { ...data };
      setList(list.map(b => b._uuid === data._uuid ? { ...b, ...merged } : b));
      const idx = A.bookings.findIndex(b => b._uuid === data._uuid);
      if (idx >= 0) A.bookings[idx] = { ...A.bookings[idx], ...merged };
      try { await window.DB.updateBooking(data._uuid, data); toast("Réservation mise à jour"); }
      catch (e) { toast("Erreur — réessayez"); }
    } else {
      try {
        let booking = { ...data };
        // create the customer first if needed
        if (data._newCustomer) {
          const cust = await window.DB.createCustomer(data._newCustomer);
          A.customers.unshift(cust);
          booking.customer = cust.id;
        }
        delete booking._newCustomer;
        const created = await window.DB.createBooking(booking);
        A.bookings.unshift(created);          // sync window.ADMIN (calendar/overview see it)
        setList([created, ...list]);
        toast("Réservation créée");
      } catch (e) { toast("Erreur — réessayez"); }
    }
    setModal(null);
  }

  return (
    <div className="view show">
      <div className="sec-title">
        <div><h2>Réservations</h2><div className="sub">{shown.length} réservation{shown.length > 1 ? "s" : ""}</div></div>

          {filters.map(f => <button key={f.k} className={"chip" + (filter === f.k ? " active" : "")} onClick={() => setFilter(f.k)}>{f.label}</button>)}

            <thead><tr><th>Réf.</th><th>Client</th><th className="hide-m">Véhicule</th><th className="hide-m">Période</th><th>Statut</th><th className="hide-m">Source</th><th>Total</th><th></th></tr></thead>
            <tbody>
              {shown.map(b => {
                const c = A.customerById(b.customer) || {}; const v = A.vehicleById(b.vehicle) || {};
                const cname = c.name || "Client inconnu"; const vname = v.name || "Véhicule";
                return (
                  <tr key={b.id}>
                    <td style={{ fontWeight: 700, color: "var(--ink-500)" }}>{b.id}</td>
                    <td><div className="cust-cell"><div className="av">{initials(cname)}</div><div><div className="nm">{cname}</div><div className="meta">{c.phone || ""}</div></div></div></td>
                    <td className="hide-m"><div className="veh-cell"><img src={v.photo || ""} alt="" /><b>{vname.replace("Mercedes-Benz ", "")}</b></div></td>
                    <td className="hide-m" style={{ color: "var(--ink-500)" }}>{fmtDate(b.from)} → {fmtDate(b.to)}<div style={{ fontSize: 11, color: "var(--ink-300)" }}>{nights(b.from, b.to)} nuits</div></td>
                    <td><StatusBadge status={b.status} /></td>
                    <td className="hide-m"><span className="src-tag">{b.source}</span></td>
                    <td style={{ fontWeight: 700 }}>{eur(b.total)}</td>
                    <td>
                      <div className="row-act">
                        {b.status === "pending" && <button className="go-confirm" title="Confirmer" onClick={() => setStatus(b.id, "confirmed", "Réservation confirmée")}><Icon name="check" /></button>}
                        <button title="Modifier" onClick={() => setModal({ mode: "edit", booking: b })}><Icon name="pencil" /></button>
                        {b.status !== "cancelled" && b.status !== "completed" && <button className="go-cancel" title="Annuler" onClick={() => setStatus(b.id, "cancelled", "Réservation annulée")}><Icon name="x" /></button>}
                      </div>
                    </td>
                  </tr>
                );
              })}
              {shown.length === 0 && <tr><td colSpan="8" style={{ textAlign: "center", padding: 40, color: "var(--ink-400)" }}>Aucune réservation pour ce filtre.</td></tr>}

    </div>
  );
}

function BookingModal({ mode, booking, onClose, onSave }) {
  const A = window.ADMIN;

              : <div style={{ background: "var(--paper)", border: "1px dashed var(--green-300)", borderRadius: 12, padding: 12, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>

          </div>
          <div className="ff"><label>Note interne</label><textarea value={f.note} onChange={set("note")} placeholder="Livraison, paiement, demandes spéciales…"></textarea></div>

        <div className="modal-foot"><button className="btn-ghost" onClick={onClose}>Annuler</button><button className="btn-add btn-green" onClick={submit}><Icon name="check" />{mode === "new" ? "Créer" : "Enregistrer"}</button></div>
      </div>
    </div>
  );
}

/* views-calendar.jsx */
/* Ecowave Admin — Calendar / availability view */
function CalView() {
  const A = window.ADMIN;
  const [vid, setVid] = useState("a-class");
  const [month, setMonth] = useState(5); // June (0-idx) 2026
  const [blocked, setBlocked] = useState(() => JSON.parse(JSON.stringify(A.blocked)));
  const year = 2026;

  // booked date set for this vehicle
  const bookedSet = useMemo(() => {
    const s = new Set();
    A.bookings.filter(b => b.vehicle === vid && b.status !== "cancelled").forEach(b => {
      let d = new Date(b.from); const end = new Date(b.to);
      while (d < end) { s.add(d.toISOString().slice(0, 10)); d.setDate(d.getDate() + 1); }
    });
    return s;
  }, [vid]);

  const monthNames = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];
  const first = (new Date(year, month, 1).getDay() + 6) % 7;
  const dim = new Date(year, month + 1, 0).getDate();
  const cells = []; for (let i = 0; i < first; i++) cells.push(null);
  for (let d = 1; d <= dim; d++) cells.push(d);

  function key(d) { return `${year}-${String(month + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`; }
  async function toggle(d) {
    const k = key(d);
    if (bookedSet.has(k)) { toast("Date réservée — gérez-la via la réservation"); return; }
    const arr = blocked[vid] || [];
    const has = arr.includes(k);
    setBlocked({ ...blocked, [vid]: has ? arr.filter(x => x !== k) : [...arr, k] });
    window.ADMIN.blocked = { ...blocked, [vid]: has ? arr.filter(x => x !== k) : [...arr, k] };
    try {
      await window.DB.setBlocked(vid, k, !has);
      toast(has ? `${d} ${monthNames[month].toLowerCase()} libéré` : `${d} ${monthNames[month].toLowerCase()} bloqué`);
    } catch (e) { toast("Erreur — réessayez"); }
  }

  return (
    <div className="view show">
      <div className="sec-title"><div><h2>Disponibilités</h2><div className="sub">Bloquez des dates et visualisez les réservations — anti double-réservation</div></div></div>

      <div className="cal-tabs">
        {A.vehicles.map(v => (
          <button key={v.id} className={"cal-tab" + (vid === v.id ? " active" : "")} onClick={() => setVid(v.id)}>
            <img src={v.photo} alt="" />{v.name.replace("Mercedes-Benz ", "")}
          </button>
        ))}
      </div>

      <div className="calwrap">
        <div className="calhead">
          <button className="calnav" onClick={() => setMonth(Math.max(0, month - 1))}><Icon name="chevron-left" /></button>
          <b>{monthNames[month]} {year}</b>
          <button className="calnav" onClick={() => setMonth(Math.min(11, month + 1))}><Icon name="chevron-right" /></button>
        </div>
        <div className="dow"><span>L</span><span>M</span><span>M</span><span>J</span><span>V</span><span>S</span><span>D</span></div>
        <div className="days">
          {cells.map((d, i) => {
            if (!d) return <div className="day muted" key={i}></div>;
            const k = key(d);
            const isBooked = bookedSet.has(k);
            const isBlocked = (blocked[vid] || []).includes(k);
            const cls = "day" + (isBooked ? " booked" : isBlocked ? " blocked" : "");
            return <div className={cls} key={i} onClick={() => toggle(d)}>{d}{isBooked && <span className="mk">réservé</span>}{isBlocked && !isBooked && <span className="mk">bloqué</span>}</div>;
          })}
        </div>
        <div className="callegend">
          <div className="lg"><span className="sw" style={{ background: "#fff", border: "1px solid var(--line)" }}></span>Disponible</div>
          <div className="lg"><span className="sw" style={{ background: "var(--info-bg)", border: "1px solid #b8d4e0" }}></span>Réservé</div>
          <div className="lg"><span className="sw" style={{ background: "var(--danger-bg)", border: "1px solid #e8bdb8" }}></span>Bloqué (manuel)</div>
        </div>
      </div>
    </div>
  );
}
Object.assign(window, { CalView });

</script>

function Revenue() {

  const totalA = A.revenueMonthly.reduce((s, r) => s + r.a, 0);

  const yearTotal = totalA + totalC;
  const maxBar = Math.max(...A.revenueMonthly.map(r => r.a + r.c));
  const avgBooking = Math.round(completed.reduce((s, b) => s + b.total, 0) / completed.length);

  const perVehicle = A.vehicles.map(v => {
    const bk = completed.filter(b => b.vehicle === v.id);
    const rev = bk.reduce((s, b) => s + b.total, 0);
    return { v, count: bk.length, rev };
  });
  const totalRev = perVehicle.reduce((s, p) => s + p.rev, 0);

  return (
    <div className="view show">
      <div className="sec-title"><div><h2>Revenus & statistiques</h2><div className="sub">Vue d'ensemble · 8 derniers mois</div></div>
        <button className="btn-ghost" onClick={() => toast("Export PDF (à venir)")}><Icon name="download" />Exporter</button>
      </div>

      <div className="kpis">
        <div className="kpi g"><div className="ktrend up"><Icon name="trending-up" />+18%</div><div className="ki"><Icon name="banknote" /></div><div className="kv">{eur(yearTotal)}</div><div className="kl">Chiffre d'affaires total</div></div>
        <div className="kpi b"><div className="ki"><Icon name="calendar-check" /></div><div className="kv">{completed.length}</div><div className="kl">Réservations honorées</div></div>
        <div className="kpi o"><div className="ki"><Icon name="receipt" /></div><div className="kv">{eur(avgBooking)}</div><div className="kl">Panier moyen</div></div>
        <div className="kpi p"><div className="ki"><Icon name="percent" /></div><div className="kv">68%</div><div className="kl">Taux d'occupation</div></div>
      </div>

      <div className="panel" style={{ marginBottom: 20 }}>
        <div className="panel-head"><h3>Revenus mensuels par véhicule</h3></div>
        <div className="chart" style={{ height: 240 }}>
          {A.revenueMonthly.map((r, i) => {
            const tot = r.a + r.c;
            return (
              <div className="bar-col" key={i} title={eur(tot)}>
                <span style={{ fontSize: 11, fontWeight: 700, color: "var(--ink-500)" }}>{eur(tot)}</span>
                <div className="bar-stack" style={{ height: (tot / maxBar * 100) + "%" }}>
                  <div className="bar-c" style={{ height: (r.c / tot * 100) + "%" }}></div>
                  <div className="bar-a" style={{ height: (r.a / tot * 100) + "%" }}></div>
                </div>
                <span className="bm">{r.m}</span>
              </div>
            );
          })}
        </div>
        <div className="chart-legend">
          <div className="lg"><span className="sw" style={{ background: "var(--green-300)" }}></span>Classe A · {eur(totalA)}</div>
          <div className="lg"><span className="sw" style={{ background: "var(--green-600)" }}></span>Classe C · {eur(totalC)}</div>
        </div>
      </div>

      <div className="panel">
        <div className="panel-head"><h3>Performance par véhicule</h3></div>
        <div style={{ padding: 22 }}>
          {perVehicle.map(p => (
            <div key={p.v.id} style={{ marginBottom: 18 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <img src={p.v.photo} alt="" style={{ width: 40, height: 28, borderRadius: 6, objectFit: "cover" }} />
                  <div><b style={{ fontSize: 13.5 }}>{p.v.name.replace("Mercedes-Benz ", "")}</b><div style={{ fontSize: 11.5, color: "var(--ink-400)" }}>{p.count} réservations</div></div>
                </div>
                <b style={{ fontFamily: "var(--font-d)", fontSize: 17 }}>{eur(p.rev)}</b>
              </div>
              <div style={{ height: 10, borderRadius: 999, background: "var(--mist)", overflow: "hidden" }}>
                <div style={{ height: "100%", borderRadius: 999, width: (p.rev / totalRev * 100) + "%", background: "linear-gradient(90deg,var(--green-600),var(--lime))" }}></div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}
Object.assign(window, { Revenue });

</script>
  <script type="text/babel">
/* views-vehicles.jsx */
/* Ecowave Admin — Vehicles management view */
function Vehicles() {
  const A = window.ADMIN;
  const [list, setList] = useState(A.vehicles);
  const [edit, setEdit] = useState(null);

  async function flip(id) {
    const v = list.find(x => x.id === id);
    const next = !v.active;
    setList(list.map(x => x.id === id ? { ...x, active: next } : x));
    try { await window.DB.updateVehicle(id, { active: next }); toast(next ? "Véhicule rendu disponible" : "Véhicule masqué du site"); }
    catch (e) { toast("Erreur — réessayez"); }
  }
  async function save(data) {
    setList(list.map(v => v.id === data.id ? { ...v, ...data } : v));
    try {
      await window.DB.updateVehicle(data.id, { name: data.name, trim: data.trim, day: data.day, weekend: data.weekend, week: data.week, deposit: data.deposit, kmDay: data.kmDay, extraKm: data.extraKm });
      toast(`${data.name} mis à jour`);
    } catch (e) { toast("Erreur — réessayez"); }
    setEdit(null);
  }

  return (
    <div className="view show">
      <div className="sec-title">
        <div><h2>Véhicules</h2><div className="sub">{list.length} véhicules · {list.filter(v => v.active).length} en ligne</div></div>
        <button className="btn-add btn-green" onClick={() => toast("Formulaire d'ajout de véhicule")}><Icon name="plus" />Ajouter un véhicule</button>
      </div>

      {list.map(v => (
        <div className="vrow" key={v.id}>
          <img className="photo" src={v.photo} alt={v.name} />
          <div className="info">
            <h3>{v.name}</h3>
            <div className="badges"><span className="vbadge amg">{v.trim}</span><span className="vbadge cat">{v.cat}</span></div>
            <div className="priceline">
              <div className="priceitem">24h<b>{eur(v.day)}</b></div>
              <div className="priceitem">Weekend<b>{eur(v.weekend)}</b></div>
              <div className="priceitem">Semaine<b>{v.week ? eur(v.week) : "—"}</b></div>
              <div className="priceitem">Caution<b>{eur(v.deposit)}</b></div>
              <div className="priceitem">Km/jour<b>{v.kmDay}</b></div>
            </div>
          </div>
          <div className="vactions">
            <div className="statusctl">
              <span className={"statustxt " + (v.active ? "on" : "off")}>{v.active ? "Disponible" : "Masqué"}</span>
              <div className={"toggle" + (v.active ? " on" : "")} onClick={() => flip(v.id)}><div className="knob"></div></div>
            </div>
            <button className="btn-ghost" onClick={() => setEdit(v)}><Icon name="pencil" />Modifier</button>
          </div>
        </div>
      ))}

      {edit && <VehicleModal v={edit} onClose={() => setEdit(null)} onSave={save} />}
    </div>
  );
}

function VehicleModal({ v, onClose, onSave }) {
  const [f, setF] = useState(v);
  const set = (k, num) => (e) => setF({ ...f, [k]: num ? (e.target.value === "" ? null : Number(e.target.value)) : e.target.value });
  return (
    <div className="overlay show" onClick={e => { if (e.target.classList.contains("overlay")) onClose(); }}>
      <div className="modal">
        <div className="modal-head"><h3>Modifier — {f.name}</h3><button className="x" onClick={onClose}><Icon name="x" /></button></div>
        <div className="modal-body">
          <div className="grid2">
            <div className="ff"><label>Nom</label><div className="inp"><input value={f.name} onChange={set("name")} /></div></div>
            <div className="ff"><label>Finition</label><div className="inp"><input value={f.trim} onChange={set("trim")} /></div></div>
            <div className="ff"><label>Prix / 24h</label><div className="inp"><span className="cur">€</span><input type="number" value={f.day} onChange={set("day", true)} /></div></div>
            <div className="ff"><label>Weekend</label><div className="inp"><span className="cur">€</span><input type="number" value={f.weekend} onChange={set("weekend", true)} /></div></div>
            <div className="ff"><label>Semaine</label><div className="inp"><span className="cur">€</span><input type="number" value={f.week || ""} placeholder="Sur demande" onChange={set("week", true)} /></div></div>
            <div className="ff"><label>Caution</label><div className="inp"><span className="cur">€</span><input type="number" value={f.deposit} onChange={set("deposit", true)} /></div></div>
            <div className="ff"><label>Km / jour inclus</label><div className="inp"><input type="number" value={f.kmDay} onChange={set("kmDay", true)} /></div></div>
            <div className="ff"><label>Prix km supplémentaire</label><div className="inp"><span className="cur">€</span><input type="number" step="0.01" value={f.extraKm ?? ""} placeholder="À préciser" onChange={set("extraKm", true)} /></div></div>
          </div>
        </div>
        <div className="modal-foot"><button className="btn-ghost" onClick={onClose}>Annuler</button><button className="btn-add btn-green" onClick={() => onSave(f)}><Icon name="check" />Enregistrer</button></div>
      </div>
    </div>
  );
}
Object.assign(window, { Vehicles, VehicleModal });

</script>
  <script type="text/babel">
/* app.jsx */
/* Ecowave Admin — app shell: login (Supabase Auth), sidebar, router */
function App() {
  const [authed, setAuthed] = useState(false);
  const [loaded, setLoaded] = useState(false);
  const [view, setView] = useState("overview");
  const [openNew, setOpenNew] = useState(false);
  const [sideOpen, setSideOpen] = useState(false);

  // restore session + load data on mount
  useEffect(() => {
    (async () => {
      try {
        const s = await window.DB.currentSession();
        if (s) { await window.DB.loadAll(); setAuthed(true); }
      } catch (e) {}
      setLoaded(true);
    })();
  }, []);

  async function onAuthed() {
    try { await window.DB.loadAll(); } catch (e) { toast("Erreur de chargement des données"); }
    setAuthed(true);
  }
  async function logout() { try { await window.DB.signOut(); } catch (e) {} setAuthed(false); }

  function go(v, arg) {
    setView(v);
    setOpenNew(v === "bookings" && arg === "new");
    setSideOpen(false);
  }

  const A = window.ADMIN;
  const pending = authed ? A.bookings.filter(b => b.status === "pending").length : 0;
  const nav = [
    { k: "overview", label: "Tableau de bord", icon: "layout-dashboard" },
    { k: "bookings", label: "Réservations", icon: "calendar-check", badge: pending },
    { k: "calendar", label: "Disponibilités", icon: "calendar-x" },
    { k: "customers", label: "Clients", icon: "users" },
    { k: "revenue", label: "Revenus", icon: "trending-up" },
    { k: "vehicles", label: "Véhicules", icon: "car-front" },
  ];
  const titles = { overview: "Tableau de bord", bookings: "Réservations", calendar: "Disponibilités", customers: "Clients", revenue: "Revenus & statistiques", vehicles: "Véhicules" };

  if (!loaded) return <div id="login"><div style={{ color: "#fff", fontFamily: "var(--font-d)", fontSize: 18 }}>Chargement…</div></div>;
  if (!authed) return <Login onAuthed={onAuthed} />;

  return (
    <div className="layout">
      <div className={"scrim" + (sideOpen ? " show" : "")} onClick={() => setSideOpen(false)}></div>
      <aside className={"sidebar" + (sideOpen ? " open" : "")}>
        <div className="side-logo">
          <img src="../assets/logo-ecowave.png" alt="Ecowave Rental" style={{ height: 30 }} />
          <span className="side-admin-tag">Admin</span>
        </div>
        <div className="nav-group">Gestion</div>
        {nav.slice(0, 4).map(n => (
          <button key={n.k} className={"nav-item" + (view === n.k ? " active" : "")} onClick={() => go(n.k)}>
            <Icon name={n.icon} />{n.label}{n.badge > 0 && <span className="badge">{n.badge}</span>}
          </button>
        ))}
        <div className="nav-group">Business</div>
        {nav.slice(4).map(n => (
          <button key={n.k} className={"nav-item" + (view === n.k ? " active" : "")} onClick={() => go(n.k)}><Icon name={n.icon} />{n.label}</button>
        ))}
        <div className="side-foot">
          <div className="side-user">
            <div className="av">EW</div>
            <div style={{ flex: 1 }}><div className="nm">Ecowave Admin</div><div className="rl">Propriétaire</div></div>
            <button className="side-logout" title="Déconnexion" onClick={logout}><Icon name="log-out" /></button>
          </div>
        </div>
      </aside>

      <div className="main">
        <div className="topbar">
          <div className="topbar-left">
            <button className="burger" onClick={() => setSideOpen(true)}><Icon name="menu" /></button>
            <h1>{titles[view]}</h1>
          </div>
          <div className="right">
            <span className="pill-live"><span className="dot"></span>Site en ligne</span>
            <a className="btn-ghost" href="../index.html" target="_blank"><Icon name="external-link" />Voir le site</a>
          </div>
        </div>
        <div className="content">
          {view === "overview" && <Overview go={go} />}
          {view === "bookings" && <Bookings openNew={openNew} />}
          {view === "calendar" && <CalView />}
          {view === "customers" && <Customers />}
          {view === "revenue" && <Revenue />}
          {view === "vehicles" && <Vehicles />}
        </div>
      </div>
    </div>
  );
}

function Login({ onAuthed }) {
  const [email, setEmail] = useState("admin@ecowaverental.be");
  const [pwd, setPwd] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);
  async function submit() {
    setErr(""); setBusy(true);
    try { await window.DB.signIn(email.trim(), pwd); onAuthed(); }
    catch (e) { setErr("Email ou mot de passe incorrect."); setBusy(false); }
  }
  return (
    <div id="login">
      <div className="login-card">
        <div className="login-logo"><span className="wave-logo"><img src="../assets/logo-ecowave.png" alt="Ecowave Rental" style={{ height: 30 }} /></span></div>
        <div className="sub">Espace d'administration</div>
        <div className="fld"><label>Email</label><div className="inp"><Icon name="mail" /><input value={email} onChange={e => setEmail(e.target.value)} /></div></div>
        <div className="fld"><label>Mot de passe</label><div className="inp"><Icon name="lock" /><input type="password" value={pwd} onChange={e => setPwd(e.target.value)} onKeyDown={e => e.key === "Enter" && submit()} placeholder="••••••••" /></div></div>
        {err && <div style={{ color: "var(--danger)", fontSize: 12.5, fontWeight: 600, marginBottom: 12, textAlign: "left" }}>{err}</div>}
        <button className="btn-primary" onClick={submit} disabled={busy}><Icon name="log-in" />{busy ? "Connexion…" : "Se connecter"}</button>
        <div className="login-hint">Accès réservé — Ecowave Rental</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

    window.addEventListener("load", function () {
      setTimeout(function () {
        try {
          var L = window.lucide; if (!L) return;
          function setIcon(id, kebab) {
            var host = document.getElementById(id); if (!host) return;
            var svg = window.makeLucideSvg(kebab);
            if (svg) { host.textContent = ""; host.appendChild(svg); }
          }
          setIcon("toasticon", "check-circle");
          setIcon("demoicon", "eye");
        } catch (e) {}
      }, 400);
    });
