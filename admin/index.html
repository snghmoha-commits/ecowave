<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecowave Admin — Tableau de bord</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300..800&family=Schibsted+Grotesk:wght@400..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
</head>
<body>
  <div id="root"></div>
  <div class="toast" id="toast"><span class="ic" id="toasticon"></span><span id="toastmsg">Enregistré</span></div>
  <div class="demo-banner"><span id="demoicon"></span>Aperçu de démonstration — données fictives (sera connecté à la base de données)</div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script src="supabase-config.js"></script>
  <script src="db.js"></script>
  <script type="text/babel" src="views-overview.jsx"></script>
  <script type="text/babel" src="views-bookings.jsx"></script>
  <script type="text/babel" src="views-calendar.jsx"></script>
  <script type="text/babel" src="views-customers.jsx"></script>
  <script type="text/babel" src="views-revenue.jsx"></script>
  <script type="text/babel" src="views-vehicles.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
  <script>
    // demo banner + toast icons (outside React)
    window.addEventListener("load", () => setTimeout(() => {
      if (window.lucide) {
        document.getElementById("toasticon").setAttribute("data-lucide", "check-circle");
        document.getElementById("demoicon").setAttribute("data-lucide", "eye");
        lucide.createIcons();
      }
    }, 500));
  </script>
</body>
</html>
