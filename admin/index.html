<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecowave Admin — Tableau de bord</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300..800&family=Schibsted+Grotesk:wght@400..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
</head>
<body>
  <div id="root"></div>
  <script>
    // Filet de sécurité : affiche toute erreur à l'écran au lieu d'un écran blanc.
    window.addEventListener("error", function (e) {
      var root = document.getElementById("root");
      if (root && root.children.length <= 1) {
        root.innerHTML = '<div style="font-family:sans-serif;max-width:560px;margin:60px auto;padding:28px;background:#fff;border:1px solid #E3E7E5;border-radius:16px;color:#0B0F0D">'
          + '<h2 style="margin:0 0 10px">Une erreur a empeche le chargement</h2>'
          + '<pre style="background:#F4F6F5;padding:12px;border-radius:8px;font-size:12px;white-space:pre-wrap;color:#B23A33">'
          + (e.message || "Erreur inconnue") + '</pre>'
          + '<p style="color:#6A766F;font-size:13px">Recharge la page (Ctrl+Shift+R). Ne modifie pas les fichiers — reinstalle le dossier admin original.</p></div>';
      }
    });
  </script>
  <div class="toast" id="toast"><span class="ic" id="toasticon"></span><span id="toastmsg">Enregistré</span></div>
  <div class="demo-banner"><span id="demoicon"></span>Aperçu de démonstration — données fictives (sera connecté à la base de données)</div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script src="supabase-config.js"></script>
  <script src="db.js"></script>
  <script type="text/babel" src="views-overview.jsx"></script>
  <script type="text/babel" src="views-bookings.jsx"></script>
  <script type="text/babel" src="views-calendar.jsx"></script>
  <script type="text/babel" src="views-customers.jsx"></script>
  <script type="text/babel" src="views-revenue.jsx"></script>
  <script type="text/babel" src="views-vehicles.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
  <script>
    // demo banner + toast icons (static, outside React) — build locally, no global scan
    window.addEventListener("load", function () {
      setTimeout(function () {
        try {
          var L = window.lucide; if (!L) return;
          function setIcon(id, kebab) {
            var host = document.getElementById(id); if (!host) return;
            var pascal = kebab.split("-").map(function (w) { return w.charAt(0).toUpperCase() + w.slice(1); }).join("");
            var node = (L.icons || {})[pascal];
            if (node && L.createElement) { host.textContent = ""; host.appendChild(L.createElement(node)); }
          }
          setIcon("toasticon", "check-circle");
          setIcon("demoicon", "eye");
        } catch (e) {}
      }, 400);
    });
  </script>
</body>
</html>
